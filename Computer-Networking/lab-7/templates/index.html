<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>停车场系统</title>
<style>
:root {
    --bg-1: #f8fff3;
    --bg-2: #eaf7ff;
    --card: #ffffff;
    --ink: #1f2937;
    --muted: #5b6475;
    --accent: #0f766e;
    --accent-2: #065f46;
    --warn: #b91c1c;
    --ok: #14532d;
    --shadow: 0 20px 40px rgba(15, 23, 42, 0.16);
    --radius: 18px;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    min-height: 100vh;
    font-family: "Avenir Next", "PingFang SC", "Microsoft YaHei", sans-serif;
    color: var(--ink);
    background:
        radial-gradient(circle at 10% 10%, rgba(16, 185, 129, 0.22), transparent 35%),
        radial-gradient(circle at 88% 14%, rgba(59, 130, 246, 0.2), transparent 30%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2));
    display: grid;
    place-items: center;
    padding: 24px;
}

.shell {
    width: min(760px, 96vw);
    background: rgba(255, 255, 255, 0.78);
    border: 1px solid rgba(255, 255, 255, 0.9);
    box-shadow: var(--shadow);
    border-radius: var(--radius);
    backdrop-filter: blur(8px);
    overflow: hidden;
}

.header {
    padding: 22px 24px 14px;
    background: linear-gradient(120deg, rgba(15, 118, 110, 0.12), rgba(2, 132, 199, 0.12));
    border-bottom: 1px solid rgba(15, 118, 110, 0.14);
}

.header h1 {
    margin: 0;
    font-size: 26px;
    letter-spacing: 0.5px;
}

.header p {
    margin: 8px 0 0;
    color: var(--muted);
    font-size: 14px;
}

.main {
    padding: 22px 24px 28px;
}

.field-label {
    display: block;
    font-weight: 700;
    margin-bottom: 10px;
}

.input-wrap {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    align-items: center;
}

input[type="file"] {
    width: 100%;
    border: 1px solid #d1d5db;
    border-radius: 12px;
    padding: 10px;
    background: #f8fafc;
}

.upload-btn {
    border: none;
    border-radius: 12px;
    padding: 11px 18px;
    color: white;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    cursor: pointer;
    transition: transform 0.15s ease, filter 0.15s ease;
}

.upload-btn:hover {
    transform: translateY(-1px);
    filter: brightness(1.05);
}

.upload-btn:disabled {
    cursor: not-allowed;
    filter: grayscale(0.1) brightness(0.85);
    transform: none;
}

.hint {
    margin-top: 10px;
    color: var(--muted);
    font-size: 13px;
}

.status-panel {
    margin-top: 18px;
    border: 1px solid #e5e7eb;
    background: #fbfdff;
    border-radius: 12px;
    padding: 14px;
}

.status-title {
    margin: 0 0 8px;
    font-size: 14px;
    color: var(--muted);
}

#result {
    margin: 0;
    white-space: pre-wrap;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    font-size: 13px;
    color: #1e293b;
}

.modal {
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.45);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 18px;
    z-index: 50;
}

.modal.show {
    display: flex;
    animation: fadeIn 0.2s ease;
}

.dialog {
    width: min(480px, 95vw);
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 22px 44px rgba(2, 6, 23, 0.28);
    padding: 18px 18px 16px;
    transform: translateY(8px);
    animation: riseIn 0.22s ease forwards;
}

.dialog h3 {
    margin: 0 0 8px;
    font-size: 20px;
}

.dialog .lines {
    margin: 0;
    padding-left: 18px;
    color: #1f2937;
    line-height: 1.6;
}

.dialog .lines li {
    margin-bottom: 2px;
}

.dialog .ok-wrap {
    display: flex;
    justify-content: flex-end;
    margin-top: 16px;
}

.ok-btn {
    min-width: 92px;
    border: none;
    border-radius: 10px;
    padding: 9px 16px;
    font-weight: 700;
    color: #ffffff;
    background: linear-gradient(135deg, #0ea5e9, #0369a1);
    cursor: pointer;
}

.ok-btn.error {
    background: linear-gradient(135deg, #dc2626, #991b1b);
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes riseIn {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 640px) {
    .input-wrap {
        grid-template-columns: 1fr;
    }

    .upload-btn {
        width: 100%;
    }
}
</style>
</head>
<body>

<div class="shell">
    <div class="header">
        <h1>停车场车牌识别系统</h1>
        <p>上传车辆车牌图片后，系统将自动识别并执行入场或出场结算。</p>
    </div>

    <div class="main">
        <label class="field-label" for="img">车牌图片</label>
        <div class="input-wrap">
            <input type="file" id="img" accept="image/*">
            <button class="upload-btn" id="upload-btn" onclick="upload()">上传识别</button>
        </div>
        <p class="hint" id="file-hint">请上传清晰、正向拍摄的车牌图片。</p>

        <div class="status-panel">
            <p class="status-title">最近一次响应</p>
            <p id="result">暂无记录</p>
        </div>
    </div>
</div>

<div class="modal" id="msg-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="dialog">
        <h3 id="modal-title">结果提示</h3>
        <ul class="lines" id="modal-lines"></ul>
        <div class="ok-wrap">
            <button class="ok-btn" id="ok-btn" onclick="closeModal()">确定</button>
        </div>
    </div>
</div>


<script>
const fileInput = document.getElementById("img");
const uploadBtn = document.getElementById("upload-btn");
const resultEl = document.getElementById("result");
const fileHint = document.getElementById("file-hint");

fileInput.addEventListener("change", () => {
    const file = fileInput.files[0];
    fileHint.textContent = file
        ? `已选择文件: ${file.name} (${Math.round(file.size / 1024)} KB)`
        : "请上传清晰、正向拍摄的车牌图片。";
});

function openModal(title, lines, isError){
    const modal = document.getElementById("msg-modal");
    const titleEl = document.getElementById("modal-title");
    const linesEl = document.getElementById("modal-lines");
    const okBtn = document.getElementById("ok-btn");

    titleEl.textContent = title;
    linesEl.innerHTML = "";
    lines.forEach(line => {
        const li = document.createElement("li");
        li.textContent = line;
        linesEl.appendChild(li);
    });

    okBtn.classList.toggle("error", Boolean(isError));
    modal.classList.add("show");
}

function closeModal(){
    document.getElementById("msg-modal").classList.remove("show");
}

async function upload(){

    const file = fileInput.files[0];
    if (!file) {
        openModal("上传失败", ["请先选择一张图片再提交。"], true);
        return;
    }

    uploadBtn.disabled = true;
    uploadBtn.textContent = "识别中...";

    const formData = new FormData();
    formData.append("image", file);

    try {
        const res = await fetch("/upload", {
            method: "POST",
            body: formData
        });

        const data = await res.json();
        resultEl.textContent = JSON.stringify(data, null, 2);

        const detailLines = [];
        if (data.msg) {
            detailLines.push(`消息: ${data.msg}`);
        }
        if (data.plate) {
            detailLines.push(`车牌号: ${data.plate}`);
        }
        if (data.type) {
            detailLines.push(`结果: ${data.type}`);
        }
        if (data.time) {
            detailLines.push(`时间: ${data.time}`);
        }
        if (data.fee !== undefined) {
            detailLines.push(`费用: ${data.fee} 元`);
        }
        if (detailLines.length === 0) {
            detailLines.push("服务端返回了空消息，请检查后端日志。");
        }

        openModal(res.ok ? "处理完成" : "处理失败", detailLines, !res.ok);
    } catch (err) {
        resultEl.textContent = `请求异常: ${err}`;
        openModal("网络异常", ["请求未成功，请确认服务器正在运行并重试。"], true);
    } finally {
        uploadBtn.disabled = false;
        uploadBtn.textContent = "上传识别";
    }
}

document.addEventListener("keydown", (evt) => {
    if (evt.key === "Escape") {
        closeModal();
    }
});
</script>

</body>
</html>
